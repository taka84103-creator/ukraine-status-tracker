<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статус населених пунктів України</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }
    header {
      background: #1a1a2e; color: white; padding: 16px 24px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    .controls {
      background: white; padding: 12px 24px;
      display: flex; flex-wrap: wrap; gap: 10px;
      border-bottom: 1px solid #e0e0e0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .controls input, .controls select {
      padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.9rem; outline: none;
    }
    .controls input:focus, .controls select:focus { border-color: #4a90d9; }
    #search { flex: 1; min-width: 220px; font-size: 0.95rem; }
    .controls select { min-width: 160px; }
    .stats {
      padding: 8px 24px; font-size: 0.83rem; color: #666;
      background: #f9f9f9; border-bottom: 1px solid #eee;
    }
    .stats span { font-weight: 600; color: #333; }
    .table-wrap { overflow-x: auto; padding: 16px 24px; }
    table {
      width: 100%; border-collapse: collapse; background: white;
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); font-size: 0.87rem;
    }
    thead tr { background: #1a1a2e; color: white; }
    thead th { padding: 11px 14px; text-align: left; font-weight: 500; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:hover { background: #f5f8ff; }
    tbody td { padding: 9px 14px; vertical-align: middle; }
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.79rem; font-weight: 600; white-space: nowrap;
    }
    .badge-free     { background: #d4f5d4; color: #1a7a1a; }
    .badge-occupied { background: #fdd;    color: #a00; }
    .badge-partial  { background: #fff3cd; color: #7a5c00; }
    .badge-unknown  { background: #eee;    color: #666; }
    .map-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: #4a90d9; text-decoration: none; font-size: 0.81rem; white-space: nowrap;
    }
    .map-link:hover { text-decoration: underline; }
    #loading { text-align: center; padding: 60px; color: #888; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #e0e0e0;
      border-top-color: #4a90d9; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #no-results { text-align: center; padding: 40px; color: #aaa; display: none; }
    .date-cell { text-align: right; color: #888; font-size: 0.81rem; }
  </style>
</head>
<body>

<header>
  <span>🇺🇦</span>
  <h1>Статус населених пунктів України</h1>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="🔍 Пошук за назвою..." oninput="filterTable()">
  <select id="filterRegion" onchange="onRegionChange()">
    <option value="">Всі області</option>
  </select>
  <select id="filterDistrict" onchange="filterTable()">
    <option value="">Всі райони</option>
  </select>
  <select id="filterType" onchange="filterTable()">
    <option value="">Всі типи</option>
  </select>
  <select id="filterStatus" onchange="filterTable()">
    <option value="">Всі статуси</option>
    <option value="Вільний">🟢 Вільний</option>
    <option value="Окупований">🔴 Окупований</option>
    <option value="Частково окупований">🟡 Частково окупований</option>
    <option value="Не вдалося визначити">⚪ Не визначено</option>
  </select>
</div>

<div class="stats" id="stats">Завантаження...</div>

<div id="loading">
  <div class="spinner"></div>
  Завантаження даних...
</div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th>Область</th>
        <th>Район</th>
        <th>Населений пункт</th>
        <th>Тип</th>
        <th>Статус</th>
        <th>Дата оновлення</th>
        <th>На карті</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div id="no-results">😕 Нічого не знайдено.</div>
</div>

<script>
  const SPREADSHEET_ID = '1GNRQ58XiEmcDRMv6nDfhNHIoE9mmRCkrj7azMU5YJjQ';
  const SHEET_NAME     = 'Населені пункти';

  // Індекси стовпців (0-based): Область, Район, Назва, Тип, Статус, Дата, Широта, Довгота
  const C = { region:0, district:1, name:2, type:3, status:4, date:5, lat:6, lon:7 };

  let allRows = [];

  // --- Парсинг дати з формату Google Sheets Date(2026,5,25,19,22,0) ---
  function parseGDate(val) {
    if (!val) return '';
    const s = String(val);
    // Формат Date(рік,місяць_0based,день,год,хв,с)
    const m = s.match(/Date\((\d+),(\d+),(\d+),(\d+),(\d+)/);
    if (m) {
      const [, y, mo, d, h, mi] = m.map(Number);
      const dd = String(d).padStart(2,'0');
      const mm = String(mo + 1).padStart(2,'0'); // місяць 0-based
      const hh = String(h).padStart(2,'0');
      const mn = String(mi).padStart(2,'0');
      return `${dd}.${mm}.${y} ${hh}:${mn}`;
    }
    return s;
  }

  async function loadData() {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    try {
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const rows = json.table.rows;

      allRows = rows.map(r =>
        r.c.map(cell => {
          if (!cell) return '';
          // Якщо є форматоване значення f — використовуємо його
          if (cell.f) return cell.f;
          // Інакше беремо v і парсимо якщо це дата
          const v = cell.v ?? '';
          if (typeof v === 'string' && v.startsWith('Date(')) return parseGDate(v);
          return v;
        })
      );

      // Прибираємо рядок заголовка якщо потрапив у дані
      if (allRows[0] && String(allRows[0][C.region]).toLowerCase() === 'область') {
        allRows.shift();
      }

      // Видаляємо повні дублікати (однакова назва + область + район + тип)
      const seen = new Set();
      allRows = allRows.filter(r => {
        const key = `${r[C.name]}|${r[C.region]}|${r[C.district]}|${r[C.type]}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      populateFilters();
      renderTable(allRows);
      document.getElementById('loading').style.display   = 'none';
      document.getElementById('tableWrap').style.display = 'block';

    } catch(e) {
      document.getElementById('loading').innerHTML =
        '❌ Помилка завантаження. Перевірте що таблиця відкрита для перегляду.';
      console.error(e);
    }
  }

  function populateFilters() {
    const regions = [...new Set(allRows.map(r => r[C.region]).filter(Boolean))].sort();
    const types   = [...new Set(allRows.map(r => r[C.type]).filter(Boolean))].sort();
    fillSelect('filterRegion', regions, 'Всі області');
    fillSelect('filterType',   types,   'Всі типи');
    updateDistrictFilter('');
  }

  function fillSelect(id, values, placeholder) {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    values.forEach(v => {
      const o = document.createElement('option');
      o.value = o.textContent = v;
      sel.appendChild(o);
    });
  }

  function updateDistrictFilter(region) {
    const districts = [...new Set(
      allRows
        .filter(r => !region || r[C.region] === region)
        .map(r => r[C.district])
        .filter(Boolean)
    )].sort();
    fillSelect('filterDistrict', districts, 'Всі райони');
  }

  function onRegionChange() {
    updateDistrictFilter(document.getElementById('filterRegion').value);
    filterTable();
  }

  function filterTable() {
    const search   = document.getElementById('search').value.toLowerCase().trim();
    const region   = document.getElementById('filterRegion').value;
    const district = document.getElementById('filterDistrict').value;
    const type     = document.getElementById('filterType').value;
    const status   = document.getElementById('filterStatus').value;

    const filtered = allRows.filter(r => {
      if (search   && !String(r[C.name]).toLowerCase().includes(search)) return false;
      if (region   && r[C.region]   !== region)   return false;
      if (district && r[C.district] !== district) return false;
      if (type     && r[C.type]     !== type)     return false;
      if (status   && r[C.status]   !== status)   return false;
      return true;
    });

    renderTable(filtered);
  }

  function renderTable(rows) {
    const tbody = document.getElementById('tableBody');
    const noRes = document.getElementById('no-results');

    updateStats(rows.length);

    if (rows.length === 0) {
      tbody.innerHTML = '';
      noRes.style.display = 'block';
      return;
    }
    noRes.style.display = 'none';

    // Показуємо до 3000 рядків
    tbody.innerHTML = rows.slice(0, 3000).map(r => {
      const name     = r[C.name]     || '';
      const region   = r[C.region]   || '';
      const district = r[C.district] || '';
      const type     = r[C.type]     || '';
      const status   = r[C.status]   || '';
      const date     = r[C.date]     || '';
      const lat      = r[C.lat];
      const lon      = r[C.lon];

      const badge = getBadge(status);

      // Посилання на Google Maps
      let mapsUrl;
      if (lat && lon && lat !== 0 && lon !== 0) {
        mapsUrl = `https://www.google.com/maps?q=${lat},${lon}&z=14`;
      } else {
        mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(name + ', Україна')}`;
      }
      const mapLink = `<a class="map-link" href="${mapsUrl}" target="_blank">🗺 ${name}</a>`;

      return `<tr>
        <td>${region}</td>
        <td>${district}</td>
        <td><strong>${name}</strong></td>
        <td>${type}</td>
        <td>${badge}</td>
        <td class="date-cell">${date}</td>
        <td>${mapLink}</td>
      </tr>`;
    }).join('');
  }

  function getBadge(status) {
    const map = {
      'Вільний':              '<span class="badge badge-free">🟢 Вільний</span>',
      'Окупований':           '<span class="badge badge-occupied">🔴 Окупований</span>',
      'Частково окупований':  '<span class="badge badge-partial">🟡 Частково окупований</span>',
      'Не вдалося визначити': '<span class="badge badge-unknown">⚪ Не визначено</span>',
    };
    return map[status] || `<span class="badge badge-unknown">${status || '—'}</span>`;
  }

  function updateStats(count) {
    document.getElementById('stats').innerHTML =
      `Показано: <span>${count.toLocaleString('uk')}</span> з <span>${allRows.length.toLocaleString('uk')}</span> населених пунктів`;
  }

  loadData();
</script>
</body>
</html>
